<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plot Legend</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f8f8f6;
            color: #1a1a1a;
            padding: 40px;
            min-height: 100vh;
        }

        h1 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 32px;
            color: #1a1a1a;
            letter-spacing: -0.01em;
        }

        .groups {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 600px;
        }

        .group {
            background: #fff;
            border: 0.5px solid rgba(0, 0, 0, 0.12);
            border-radius: 10px;
            overflow: hidden;
        }

        .group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 0.5px solid rgba(0, 0, 0, 0.08);
        }

        .color-bar {
            width: 6px;
            height: 28px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .group-name {
            font-size: 14px;
            font-weight: 500;
            color: #1a1a1a;
        }

        .subfolders {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 16px;
        }

        .subfolder {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f8f8f6;
            border: 0.5px solid rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            padding: 5px 10px;
        }

        .subfolder span {
            font-size: 12px;
            color: #555;
        }

        svg.marker {
            flex-shrink: 0;
        }
    </style>
</head>

<body>

    <h1>Plot legend</h1>

    <div class="groups">

        <div class="group">
            <div class="group-header">
                <div class="color-bar" style="background: #e6194b;"></div>
                <span class="group-name">aLA holo 1</span>
            </div>
            <div class="subfolders">
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <circle cx="7" cy="7" r="5.5" fill="#e6194b" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_1_1</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <polygon points="7,1 13,13 1,13" fill="#e6194b" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_1_2</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <rect x="1" y="1" width="12" height="12" rx="2" fill="#e6194b" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_1_3</span>
                </div>
            </div>
        </div>

        <div class="group">

            <div class="subfolders">

                        <circle cx="7" cy="7" r="5.5" fill="#42d4f4" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_2_1</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <polygon points="7,1 13,13 1,13" fill="#42d4f4" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_2_2</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <rect x="1" y="1" width="12" height="12" rx="2" fill="#42d4f4" opacity="0.85" />
                    </svg>
                    <span>aLA_holo_2_3</span>

            </div>
        </div>

        <div class="group">
            <div class="group-header">
                <div class="color-bar" style="background: #911eb4;"></div>

            </div>

                        <circle cx="7" cy="7" r="5.5" fill="#911eb4" opacity="0.85" />
                    </svg>
                    <span>aLA_apo_1_1</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <polygon points="7,1 13,13 1,13" fill="#911eb4" opacity="0.85" />
                    </svg>
                    <span>aLA_apo_1_2</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">

        <div class="group">
            <div class="group-header">
                <div class="color-bar" style="background: #3cb44b;"></div>
                <span class="group-name">BSA 1</span>
            </div>
            <div class="subfolders">
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <circle cx="7" cy="7" r="5.5" fill="#3cb44b" opacity="0.85" />
                    </svg>
                    <span>BSA_1_1</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">

        <div class="group">

                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <line x1="2" y1="2" x2="12" y2="12" stroke="#4363d8" stroke-width="2.5"
                            stroke-linecap="round" />
                        <line x1="12" y1="2" x2="2" y2="12" stroke="#4363d8" stroke-width="2.5"
                            stroke-linecap="round" />
                    </svg>
                    <span>BSA_2_5</span>
                </div>
            </div>
        </div>

        <div class="group">
            <div class="group-header">
                <div class="color-bar" style="background: #f58231;"></div>
                <span class="group-name">BSA 3</span>
            </div>
            <div class="subfolders">
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <circle cx="7" cy="7" r="5.5" fill="#f58231" opacity="0.85" />
                    </svg>
                    <span>BSA_3_1</span>
                </div>
                <div class="subfolder">
                    <svg class="marker" width="14" height="14" viewBox="0 0 14 14">
                        <polygon points="7,1 13,13 1,13" fill="#f58231" opacity="0.85" />
                    </svg>
                    <span>BSA_3_2</span>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
